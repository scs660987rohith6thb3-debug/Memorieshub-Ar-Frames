<html><head><script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script><script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.0/dist/mindar-image.prod.js"></script><script>AFRAME.registerComponent('vidhandler', {init: function () {this.vid = document.querySelector("#frame-video");this.vid.pause();},tick: function () {const sceneEl = document.querySelector('a-scene');if (sceneEl.is('mindar-image-target-found')) {if(this.vid.paused) {this.vid.play();}}}});window.addEventListener('click', function () {var video = document.querySelector('#frame-video');if (video.paused) {video.play();}});</script></head><body><a-scene mindar-image="imageTargetSrc: Photo.Mind; trackingMethod: best;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"><a-assets><video id="frame-video" src="Video.mp4" loop="true" crossorigin="anonymous"></video></assets><a-camera position="0 0 0" look-controls="enabled: false"></a-camera><a-entity mindar-image-target="targetIndex: 0" vidhandler><a-video src="#frame-video" width="1" height="1" position="0 0 0"></a-video></a-entity></a-scene></body></html>
